<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100,100)">
    
    <!-- Top -->
    <polygon points="0,-80 20,-20 0,0" fill="#FFC107"/>
    <polygon points="0,-80 -20,-20 0,0" fill="#FF9800"/>
    
    <!-- Top Right -->
    <polygon points="20,-20 80,-20 0,0" fill="#E91E63"/>
    <polygon points="80,-20 40,20 0,0" fill="#F44336"/>
    
    <!-- Bottom Right -->
    <polygon points="40,20 60,80 0,0" fill="#9E9E9E"/>
    <polygon points="60,80 0,40 0,0" fill="#BDBDBD"/>
    
    <!-- Bottom -->
    <polygon points="0,40 -60,80 0,0" fill="#311B92"/>
    <polygon points="-60,80 -40,20 0,0" fill="#673AB7"/>
    
    <!-- Bottom Left -->
    <polygon points="-40,20 -80,-20 0,0" fill="#FDD835"/>
    <polygon points="-80,-20 -20,-20 0,0" fill="#FBC02D"/>
    
    <!-- Top Left -->
    <polygon points="-20,-20 0,-80 0,0" fill="#FFEB3B"/>
    
  </g>
</svg>